services:
  cli-proxy-api:
    image: ijpq/cli-proxy-api:claude_update-6b846c3
    pull_policy: always
    container_name: cli-proxy-api
    environment:
      MANAGEMENT_PASSWORD: changeme
    ports:
      - "8317:8317"
      - "8085:8085"
      - "1455:1455"
      - "54545:54545"
      - "51121:51121"
      - "11451:11451"
    volumes:
      - ./config.yaml:/CLIProxyAPI/config.yaml
      - ./auths:/root/.cli-proxy-api
      - ./logs:/CLIProxyAPI/logs
    restart: unless-stopped
